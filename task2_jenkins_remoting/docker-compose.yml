version: '3.8'

services:
  jenkins-master:
    image: jenkins/jenkins:lts
    container_name: jenkins-master
    privileged: true
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    environment:
      - JENKINS_OPTS="--prefix=/jenkins"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - jenkins-net

  jenkins-agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: jenkins-agent
    privileged: true
    environment:
      - JENKINS_URL=http://jenkins-master:8080/jenkins
      - JENKINS_SECRET=510c4a5e0723da689fc5447239e50a87634809824597b12f6e3e50321e848ec8 # Replace this with the secret generated by master
      - JENKINS_AGENT_NAME=remote-agent
      - JENKINS_AGENT_WORKDIR=/home/jenkins/agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - jenkins-net
    depends_on:
      - jenkins-master

networks:
  jenkins-net:

volumes:
  jenkins_home:
